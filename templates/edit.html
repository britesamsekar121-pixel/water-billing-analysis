<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Edit Customer</h2>

<form method="POST">
{% csrf_token %}

<input class="form-control mb-2" name="name" value="{{ d.customer_name }}">
<input class="form-control mb-2" name="area" value="{{ d.area }}">
<input class="form-control mb-2" name="liters" value="{{ d.water_used_liters }}">

<button class="btn btn-success">Update</button>

</form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Add Customer</h2>

<form method="POST">
{% csrf_token %}

<label>Customer ID</label>
<input name="customer_id" placeholder="Enter Customer ID" required class="form-control mb-2">

<label>Name</label>
<input name="customer_name" placeholder="Enter Name" required class="form-control mb-2">

<label>Area</label>
<input name="area" placeholder="Enter Area" required class="form-control mb-2">
<select name="month" class="form-control mb-2">
<option value="Jan">Jan</option>
<option value="Feb">Feb</option>
<option value="Mar">Mar</option>
<option value="Apr">Apr</option>
<option value="May">May</option>
<option value="Jun">Jun</option>
<option value="Jul">Jul</option>
<option value="Aug">Aug</option>
<option value="Sep">Sep</option>
<option value="Oct">Oct</option>
<option value="Nov">Nov</option>
<option value="Dec">Dec</option>
</select>
<input class="form-control mb-2" name="year" placeholder="Year (e.g. 2025)">
<input class="form-control mb-2" name="liters" placeholder="Water used (liters)">

<button class="btn btn-primary">Add</button>

</form>

</body>
</html>

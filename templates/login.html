<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);

    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass effect card */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.15) !important;
    border-radius: 15px;
    color: white;
}

/* Input styling */
input {
    background: rgba(255,255,255,0.9) !important;
}

/* Text color */
h3, h5 {
    color: white;
}
</style>

</head>

<body>

<div class="card p-4 shadow" style="width:350px;">
<h3 class="text-center mb-3">Water Billing System</h3>

<h5>Admin Login</h5>
<form method="POST">
{% csrf_token %}
<input type="hidden" name="type" value="admin">
<input type="password" name="password" placeholder="Enter Admin Password" class="form-control mb-2">
<button class="btn btn-primary w-100">Login as Admin</button>
</form>

<hr>

<h5>User Login</h5>
<form method="POST">
{% csrf_token %}
<input type="hidden" name="type" value="user">
<input type="text" name="cid" placeholder="Enter Customer ID" class="form-control mb-2">
<button class="btn btn-success w-100">View My Bill</button>
</form>

<p class="text-danger text-center mt-2">{{ error }}</p>

</div>

</body>
</html>
